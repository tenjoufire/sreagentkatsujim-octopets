name: Deploy Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-and-push-containers.yml
      - backend/**
      - frontend/**
      - servicedefaults/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: octopets-backend
            container_app_name: octopetsapi
            repository: octopets/backend
            app_source_path: .
            dockerfile_path: backend/Dockerfile
            build_arguments: ''
          - image_name: octopets-frontend
            container_app_name: octopetsfe
            repository: octopets/frontend
            app_source_path: frontend
            dockerfile_path: Dockerfile
            build_arguments: |
              REACT_APP_USE_MOCK_DATA=false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and deploy ${{ matrix.image_name }}
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/${{ matrix.app_source_path }}
          dockerfilePath: ${{ matrix.dockerfile_path }}
          acrName: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          containerAppName: ${{ matrix.container_app_name }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToBuild: ${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.repository }}:${{ github.sha }}
          buildArguments: ${{ matrix.build_arguments }}
          disableTelemetry: true